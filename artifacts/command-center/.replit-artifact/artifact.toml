kind = "web"
previewPath = "/"
title = "PRO-BUILDER Command Center"
version = "1.0.0"
id = "artifacts/command-center"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23748
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/command-center run dev"

[services.env]
PORT = "23748"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/command-center", "run", "build"]
publicDir = "artifacts/command-center/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
